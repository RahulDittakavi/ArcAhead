services:
  db:
    image: postgres:16-alpine
    container_name: arcahead-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: arcahead
      POSTGRES_PASSWORD: arcahead
      POSTGRES_DB: arcahead
    ports:
      # Host 5433 → container 5432, to avoid clashing with a host-installed
      # Postgres that already owns 5432. DATABASE_URL points at 5433.
      - "5433:5432"
    volumes:
      - arcahead-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcahead"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  arcahead-pgdata:
